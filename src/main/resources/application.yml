spring:
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: glm-5.1
          temperature: 0.7
          top-p: 0.9

tencent:
  search:
    endpoint: https://wsa.tencentcloudapi.com
    timeout: 5000
    secret-id: ${TENCENT_API_SECRET_ID:}
    secret-key: ${TENCENT_API_SECRET_KEY:}

server:
  port: 8080
